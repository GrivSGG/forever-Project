<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Update Helper Role</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #4A90E2;
            margin-bottom: 30px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #4A90E2;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
        }
        button:hover {
            background: #357ABD;
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .success {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4CAF50;
            color: #4CAF50;
        }
        .error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #F44336;
            color: #F44336;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Обновление ролей</h1>
        <div class="form-group">
            <label>Пароль admin:</label>
            <input type="password" id="adminPassword" placeholder="Введите пароль admin">
        </div>
        <button onclick="updateRoles()" id="updateBtn">Обновить роли</button>
        <div id="result"></div>
    </div>

    <script>
        async function updateRoles() {
            const password = document.getElementById('adminPassword').value.trim();
            const resultDiv = document.getElementById('result');
            const btn = document.getElementById('updateBtn');
            
            if (!password) {
                resultDiv.className = 'error';
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = '❌ Введите пароль admin';
                return;
            }
            
            btn.disabled = true;
            btn.textContent = 'Обновление...';
            
            try {
                const response = await fetch('https://forever-project-production-a2fa.up.railway.app/api/admin/update-roles', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminPassword: password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    resultDiv.className = 'success';
                    resultDiv.style.display = 'block';
                    resultDiv.innerHTML = `
                        <p style="font-weight: 600; margin-bottom: 10px;">✅ Роли обновлены:</p>
                        <ul style="margin: 0; padding-left: 20px;">
                            <li>admin → role: admin</li>
                            <li>Helper → role: helper</li>
                        </ul>
                        <p style="margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(76, 175, 80, 0.3);">
                            Теперь можете войти на <a href="../index.html" style="color: #4CAF50;">главную страницу</a>
                        </p>
                    `;
                    document.getElementById('adminPassword').value = '';
                } else {
                    resultDiv.className = 'error';
                    resultDiv.style.display = 'block';
                    resultDiv.innerHTML = `❌ Ошибка: ${data.message || data.error}`;
                }
            } catch (error) {
                resultDiv.className = 'error';
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `❌ Ошибка: ${error.message}`;
            } finally {
                btn.disabled = false;
                btn.textContent = 'Обновить роли';
            }
        }
        
        // Enter key support
        document.getElementById('adminPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') updateRoles();
        });
    </script>
</body>
</html>

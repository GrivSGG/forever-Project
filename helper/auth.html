<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helper Panel - Authorization</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f0c29);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .auth-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 50px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 450px;
            width: 100%;
            backdrop-filter: blur(10px);
        }
        h1 {
            color: #4A90E2;
            margin-bottom: 10px;
            text-align: center;
            font-size: 32px;
        }
        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 40px;
            font-size: 14px;
        }
        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        .step {
            width: 40px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            transition: all 0.3s;
        }
        .step.active {
            background: #4A90E2;
        }
        .form-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #4A90E2;
            background: rgba(255, 255, 255, 0.08);
        }
        button {
            width: 100%;
            padding: 15px;
            background: #4A90E2;
            border: none;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s;
        }
        button:hover {
            background: #357ABD;
            transform: translateY(-2px);
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }
        .error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #F44336;
            color: #F44336;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        .success {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4CAF50;
            color: #4CAF50;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        .step-content {
            display: none;
        }
        .step-content.active {
            display: block;
        }
        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            margin-top: 10px;
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1>🛠️ Helper Panel</h1>
        <p class="subtitle">Двухэтапная авторизация</p>
        
        <div class="step-indicator">
            <div class="step active" id="step1-indicator"></div>
            <div class="step" id="step2-indicator"></div>
        </div>
        
        <div id="error" class="error"></div>
        <div id="success" class="success"></div>
        
        <!-- Шаг 1: Пароль Helper -->
        <div class="step-content active" id="step1">
            <div class="form-group">
                <label>Шаг 1: Пароль Helper</label>
                <input type="password" id="helperPassword" placeholder="Введите пароль Helper">
            </div>
            <button onclick="checkHelperPassword()">Далее →</button>
        </div>
        
        <!-- Шаг 2: Кодовое слово -->
        <div class="step-content" id="step2">
            <div class="form-group">
                <label>Шаг 2: Кодовое слово</label>
                <input type="text" id="codeWord" placeholder="Введите кодовое слово">
            </div>
            <button onclick="checkCodeWord()">Войти</button>
            <button class="back-btn" onclick="goBack()">← Назад</button>
        </div>
    </div>

    <script>
        const HELPER_PASSWORD = 'MZFeEgJY';
        const CODE_WORD = 'Windsurf';
        
        let currentStep = 1;
        
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }
        
        function showSuccess(message) {
            const successDiv = document.getElementById('success');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
        }
        
        function checkHelperPassword() {
            const password = document.getElementById('helperPassword').value.trim();
            
            if (!password) {
                showError('❌ Введите пароль');
                return;
            }
            
            if (password !== HELPER_PASSWORD) {
                showError('❌ Неверный пароль');
                return;
            }
            
            // Переход на шаг 2
            currentStep = 2;
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
            document.getElementById('step1-indicator').classList.remove('active');
            document.getElementById('step2-indicator').classList.add('active');
            
            showSuccess('✅ Шаг 1 пройден');
            setTimeout(() => {
                document.getElementById('success').style.display = 'none';
            }, 2000);
        }
        
        function checkCodeWord() {
            const codeWord = document.getElementById('codeWord').value.trim();
            
            if (!codeWord) {
                showError('❌ Введите кодовое слово');
                return;
            }
            
            if (codeWord !== CODE_WORD) {
                showError('❌ Неверное кодовое слово');
                return;
            }
            
            // Сохраняем токен доступа
            const accessToken = btoa(HELPER_PASSWORD + ':' + CODE_WORD + ':' + Date.now());
            localStorage.setItem('helper_access_token', accessToken);
            localStorage.setItem('helper_access_granted', 'true');
            localStorage.setItem('helper_access_time', Date.now().toString());
            
            // Также сохраняем сессию для совместимости
            const session = {
                username: 'Helper',
                role: 'helper',
                accessToken: accessToken,
                codeWordVerified: true
            };
            localStorage.setItem('forever_session', JSON.stringify(session));
            
            showSuccess('✅ Доступ разрешен! Перенаправление...');
            
            setTimeout(() => {
                window.location.href = 'panel.html';
            }, 1500);
        }
        
        function goBack() {
            currentStep = 1;
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step1').classList.add('active');
            document.getElementById('step2-indicator').classList.remove('active');
            document.getElementById('step1-indicator').classList.add('active');
            document.getElementById('codeWord').value = '';
        }
        
        // Enter key support
        document.getElementById('helperPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkHelperPassword();
        });
        
        document.getElementById('codeWord').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkCodeWord();
        });
        
        // Проверка существующего доступа
        window.addEventListener('load', () => {
            const accessGranted = localStorage.getItem('helper_access_granted');
            const accessTime = localStorage.getItem('helper_access_time');
            
            // Проверяем что доступ не истек (24 часа)
            if (accessGranted === 'true' && accessTime) {
                const timePassed = Date.now() - parseInt(accessTime);
                const hoursPassed = timePassed / (1000 * 60 * 60);
                
                if (hoursPassed < 24) {
                    // Доступ еще действителен
                    window.location.href = 'panel.html';
                }
            }
        });
    </script>
</body>
</html>

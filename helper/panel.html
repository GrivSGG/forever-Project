<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helper Panel - Forever Client</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f0c29);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: white;
            position: relative;
            overflow-x: hidden;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(74, 144, 226, 0.6);
            border-radius: 50%;
            animation: float 15s infinite;
            box-shadow: 0 0 10px rgba(74, 144, 226, 0.8);
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
        }
        
        /* Glowing orbs */
        .bg-animation::before,
        .bg-animation::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: orbFloat 20s ease-in-out infinite;
        }
        
        .bg-animation::before {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #4A90E2, transparent);
            top: 20%;
            left: 10%;
        }
        
        .bg-animation::after {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #9C27B0, transparent);
            bottom: 10%;
            right: 10%;
            animation-delay: -10s;
        }
        
        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(100px, 100px); }
        }
        
        .dashboard {
            position: relative;
            z-index: 1;
        }
        
        .dashboard { display: flex; min-height: 100vh; }
        
        .sidebar {
            width: 260px;
            background: rgba(10, 10, 10, 0.95);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-header {
            padding: 30px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .sidebar-header h2 {
            color: #4A90E2;
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .sidebar-header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }
        
        .sidebar-nav {
            flex: 1;
            padding: 20px 0;
            overflow-y: auto;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: all 0.3s;
            border-left: 3px solid transparent;
        }
        
        .nav-item:hover {
            background: rgba(74, 144, 226, 0.1);
            color: white;
            border-left-color: #4A90E2;
        }
        
        .nav-item.active {
            background: rgba(74, 144, 226, 0.2);
            color: #4A90E2;
            border-left-color: #4A90E2;
        }
        
        .nav-item i {
            font-size: 20px;
            width: 24px;
        }
        
        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .btn-logout {
            width: 100%;
            padding: 12px;
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #F44336;
            color: #F44336;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
        }
        
        .btn-logout:hover {
            background: #F44336;
            color: white;
        }
        
        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 30px;
        }
        
        .content-section {
            display: none;
        }
        
        .content-section.active {
            display: block;
        }
        
        h1 {
            font-size: 32px;
            margin-bottom: 30px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            background: rgba(74, 144, 226, 0.2);
            color: #4A90E2;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
        }
        
        .stat-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 5px;
        }
        
        .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .user-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .user-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .user-name {
            font-size: 20px;
            font-weight: 600;
        }
        
        .user-role {
            padding: 5px 12px;
            background: rgba(74, 144, 226, 0.2);
            color: #4A90E2;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .user-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .user-info strong {
            color: white;
        }
        
        .tickets-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .ticket-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .ticket-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            position: relative;
        }
        
        .ticket-title {
            font-size: 18px;
            font-weight: 600;
            flex: 1;
        }
        
        .ticket-close {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 32px;
            height: 32px;
            background: rgba(244, 67, 54, 0.2);
            border: 2px solid #F44336;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            color: #F44336;
            font-size: 18px;
            font-weight: bold;
        }
        
        .ticket-close:hover {
            background: #F44336;
            color: white;
            transform: rotate(90deg) scale(1.1);
        }
        
        .ticket-status {
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
        }
        
        .ticket-message {
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            margin: 15px 0;
        }
        
        .ticket-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .response-input {
            flex: 1;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
        }
        
        .btn {
            padding: 10px 20px;
            background: #4A90E2;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .btn:hover {
            background: #357ABD;
        }
        
        .btn-danger {
            background: #F44336;
        }
        
        .btn-danger:hover {
            background: #da190b;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .form-control {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 16px;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #4A90E2;
        }
        
        .key-generator {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
            max-width: 800px;
        }
        
        .license-types {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .license-type-btn {
            padding: 20px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        
        .license-type-btn:hover {
            background: rgba(74, 144, 226, 0.1);
            border-color: #4A90E2;
            transform: translateY(-2px);
        }
        
        .license-type-btn.active {
            background: rgba(74, 144, 226, 0.2);
            border-color: #4A90E2;
            box-shadow: 0 0 20px rgba(74, 144, 226, 0.3);
        }
        
        .license-type-btn i {
            font-size: 24px;
            color: #4A90E2;
        }
        
        .license-type-btn span {
            font-size: 14px;
            font-weight: 600;
        }
        
        .generated-keys {
            background: rgba(76, 175, 80, 0.1);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #4CAF50;
            margin-top: 20px;
        }
        
        .key-item {
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            margin: 10px 0;
        }
        
        .ban-forms {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .ban-form {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .ban-form h3 {
            margin-bottom: 20px;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            z-index: 10000;
            animation: slideIn 0.3s ease;
        }
        
        .notification-success { background: #4CAF50; }
        .notification-error { background: #F44336; }
        .notification-info { background: #2196F3; }
        
        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation" id="bgAnimation"></div>
    
    <div class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Helper Panel</h2>
                <p>Forever Client</p>
            </div>
            
            <nav class="sidebar-nav">
                <div class="nav-item active" onclick="showSection('overview')">
                    <i class="fas fa-chart-line"></i>
                    <span>Обзор</span>
                </div>
                <div class="nav-item" onclick="showSection('users')">
                    <i class="fas fa-users"></i>
                    <span>Пользователи</span>
                </div>
                <div class="nav-item" onclick="showSection('tickets')">
                    <i class="fas fa-ticket-alt"></i>
                    <span>Тикеты</span>
                </div>
                <div class="nav-item" onclick="showSection('keygen')">
                    <i class="fas fa-plus-circle"></i>
                    <span>Генератор ключей</span>
                </div>
                <div class="nav-item" onclick="showSection('keys')">
                    <i class="fas fa-key"></i>
                    <span>Все ключи</span>
                </div>
                <div class="nav-item" onclick="showSection('bans')">
                    <i class="fas fa-ban"></i>
                    <span>Баны</span>
                </div>
            </nav>
            
            <div class="sidebar-footer">
                <a href="../index.html" class="btn-logout">
                    <i class="fas fa-sign-out-alt"></i>
                    Выход
                </a>
            </div>
        </aside>
        
        <main class="main-content">
            <!-- Overview Section -->
            <section id="overview" class="content-section active">
                <h1>Обзор</h1>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-users"></i></div>
                        <div>
                            <div class="stat-value" id="totalUsers">0</div>
                            <div class="stat-label">Пользователей</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-ticket-alt"></i></div>
                        <div>
                            <div class="stat-value" id="totalTickets">0</div>
                            <div class="stat-label">Тикетов</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-key"></i></div>
                        <div>
                            <div class="stat-value" id="totalLicenses">0</div>
                            <div class="stat-label">Лицензий</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-ban"></i></div>
                        <div>
                            <div class="stat-value" id="totalBans">0</div>
                            <div class="stat-label">Банов</div>
                        </div>
                    </div>
                </div>
            </section>
            
            <!-- Users Section -->
            <section id="users" class="content-section">
                <h1>Пользователи</h1>
                <div id="usersContainer" class="users-grid"></div>
            </section>
            
            <!-- Tickets Section -->
            <section id="tickets" class="content-section">
                <h1>Тикеты</h1>
                <div id="ticketsContainer" class="tickets-list"></div>
            </section>
            
            <!-- Key Generator Section -->
            <section id="keygen" class="content-section">
                <h1>Генератор ключей</h1>
                <div class="key-generator">
                    <h3>Создать ключи</h3>
                    <div class="form-group">
                        <label>Тип лицензии:</label>
                        <div class="license-types">
                            <div class="license-type-btn active" data-type="1day" onclick="selectLicenseType('1day')">
                                <i class="fas fa-clock"></i>
                                <span>1 день</span>
                            </div>
                            <div class="license-type-btn" data-type="7days" onclick="selectLicenseType('7days')">
                                <i class="fas fa-calendar-week"></i>
                                <span>7 дней</span>
                            </div>
                            <div class="license-type-btn" data-type="30days" onclick="selectLicenseType('30days')">
                                <i class="fas fa-calendar-alt"></i>
                                <span>30 дней</span>
                            </div>
                            <div class="license-type-btn" data-type="90days" onclick="selectLicenseType('90days')">
                                <i class="fas fa-calendar"></i>
                                <span>90 дней</span>
                            </div>
                            <div class="license-type-btn" data-type="beta" onclick="selectLicenseType('beta')">
                                <i class="fas fa-flask"></i>
                                <span>Бета</span>
                            </div>
                            <div class="license-type-btn" data-type="lifetime" onclick="selectLicenseType('lifetime')">
                                <i class="fas fa-infinity"></i>
                                <span>Навсегда</span>
                            </div>
                        </div>
                        <input type="hidden" id="keyType" value="1day">
                    </div>
                    <div class="form-group">
                        <label>Количество (1-100):</label>
                        <input type="number" id="keyCount" class="form-control" min="1" max="100" value="1">
                    </div>
                    <button class="btn" onclick="generateKeys()">Сгенерировать</button>
                    <div id="generatedKeysContainer"></div>
                </div>
            </section>
            
            <!-- All Keys Section -->
            <section id="keys" class="content-section">
                <h1>Все ключи</h1>
                <div id="keysContainer"></div>
            </section>
            
            <!-- Bans Section -->
            <section id="bans" class="content-section">
                <h1>Система банов</h1>
                <div class="ban-forms">
                    <div class="ban-form">
                        <h3>Бан по логину</h3>
                        <div class="form-group">
                            <input type="text" id="banUsername" class="form-control" placeholder="Логин пользователя">
                        </div>
                        <div class="form-group">
                            <select id="banDuration" class="form-control">
                                <option value="1">1 час</option>
                                <option value="24">1 день</option>
                                <option value="168">7 дней</option>
                                <option value="720">30 дней</option>
                                <option value="permanent">Навсегда</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <input type="text" id="banReason" class="form-control" placeholder="Причина бана">
                        </div>
                        <button class="btn btn-danger" onclick="banUser()">Забанить</button>
                    </div>
                    
                    <div class="ban-form">
                        <h3>Бан по IP</h3>
                        <div class="form-group">
                            <input type="text" id="banIP" class="form-control" placeholder="IP адрес">
                        </div>
                        <div class="form-group">
                            <input type="text" id="banIPReason" class="form-control" placeholder="Причина бана">
                        </div>
                        <button class="btn btn-danger" onclick="banIP()">Забанить IP</button>
                    </div>
                </div>
                <div id="bansContainer"></div>
            </section>
        </main>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <script src="../firebase-config.js"></script>
    <script src="panel.js"></script>
</body>
</html>

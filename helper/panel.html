<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helper Panel - Forever Client</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f0c29);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: white;
            min-height: 100vh;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }
        h1 { text-align: center; font-size: 48px; margin-bottom: 40px; color: #4A90E2; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; }
        .stat-value { font-size: 48px; font-weight: 700; color: #4A90E2; margin-bottom: 10px; }
        .stat-label { font-size: 18px; color: rgba(255, 255, 255, 0.7); }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .nav-tab { padding: 12px 24px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: rgba(255, 255, 255, 0.7); cursor: pointer; transition: all 0.3s; font-weight: 600; }
        .nav-tab:hover { background: rgba(255, 255, 255, 0.1); color: white; }
        .nav-tab.active { background: #4A90E2; color: white; border-color: #4A90E2; }
        .section { background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 30px; }
        .section h2 { font-size: 32px; margin-bottom: 25px; color: #4A90E2; }
        .users-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .user-card { background: rgba(255, 255, 255, 0.03); padding: 20px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .user-name { font-size: 20px; font-weight: 600; margin-bottom: 15px; color: #4A90E2; }
        .user-info { color: rgba(255, 255, 255, 0.7); line-height: 1.8; }
        .ticket-card { background: rgba(255, 255, 255, 0.03); padding: 20px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: rgba(255, 255, 255, 0.9); font-weight: 600; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: white; font-size: 14px; }
        .form-group textarea { min-height: 100px; resize: vertical; }
        .license-types { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .license-type-btn { padding: 15px; background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: rgba(255, 255, 255, 0.7); cursor: pointer; transition: all 0.3s; text-align: center; font-weight: 600; }
        .license-type-btn:hover { background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.3); }
        .license-type-btn.active { background: rgba(74, 144, 226, 0.2); border-color: #4A90E2; color: #4A90E2; }
        .generated-keys { background: rgba(76, 175, 80, 0.1); padding: 20px; border-radius: 12px; border: 1px solid rgba(76, 175, 80, 0.3); margin-top: 20px; }
        .key-item { background: rgba(255, 255, 255, 0.05); padding: 12px; border-radius: 8px; margin-bottom: 8px; font-family: 'Courier New', monospace; font-size: 16px; color: #4CAF50; }
        .loading { text-align: center; padding: 60px; font-size: 24px; color: #4A90E2; }
        .error { text-align: center; padding: 60px; font-size: 20px; color: #F44336; }
        .btn { padding: 12px 24px; background: #4A90E2; border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 10px; text-decoration: none; display: inline-block; }
        .btn:hover { background: #357ABD; }
        .btn-danger { background: #F44336; }
        .btn-danger:hover { background: #da190b; }
        .response-input { width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: white; margin-top: 15px; }
        .ticket-status { padding: 8px 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛠️ Helper Panel</h1>
        <div class="nav-tabs">
            <div class="nav-tab active" onclick="showTab('overview')">📊 Обзор</div>
            <div class="nav-tab" onclick="showTab('userinfo')">🔍 Поиск</div>
            <div class="nav-tab" onclick="showTab('users')">👥 Пользователи</div>
            <div class="nav-tab" onclick="showTab('tickets')">🎫 Тикеты</div>
            <div class="nav-tab" onclick="showTab('keygen')">🔑 Генератор</div>
            <div class="nav-tab" onclick="showTab('allkeys')">📋 Ключи</div>
            <div class="nav-tab" onclick="showTab('bans')">⛔ Баны</div>
        </div>
        <div id="content">
            <div class="loading">
                <i class="fas fa-spinner fa-spin" style="font-size: 48px; margin-bottom: 20px; display: block;"></i>
                Загрузка...
            </div>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBbZLa2MBIIMSto6exJhIH1Vv2POzhakRM",
            authDomain: "forever-client.firebaseapp.com",
            projectId: "forever-client",
            storageBucket: "forever-client.firebasestorage.app",
            messagingSenderId: "639676123653",
            appId: "1:639676123653:web:dd28cb5cc5ae537020326c"
        };
        
        let db, usersData = {}, ticketsData = [], licensesData = [], bansData = [];
        let currentTab = 'overview', selectedLicenseType = '30days', selectedPaymentType = 'paid';
        
        const typeNames = {
            '1day': '1 день', '7days': '7 дней', '30days': '30 дней',
            '90days': '90 дней', 'beta': 'Бета', 'lifetime': 'Навсегда'
        };
        
        // Check access
        const sessionData = localStorage.getItem('forever_session');
        if (!sessionData) {
            alert('⛔ Требуется авторизация!');
            window.location.href = '../index.html';
            throw new Error('No session');
        }
        
        const session = JSON.parse(sessionData);
        if (session.username !== 'admin' && session.username !== 'Helper') {
            alert('⛔ Доступ запрещен!');
            window.location.href = '../index.html';
            throw new Error('Access denied');
        }
        
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        
        window.addEventListener('load', () => loadData());
        
        async function loadData() {
            try {
                const [users, tickets, licenses, bans] = await Promise.all([
                    db.collection('users').get(),
                    db.collection('tickets').get(),
                    db.collection('licenses').get(),
                    db.collection('bans').get()
                ]);
                
                usersData = {};
                users.forEach(doc => usersData[doc.id] = doc.data());
                
                ticketsData = [];
                tickets.forEach(doc => ticketsData.push({ id: doc.id, ...doc.data() }));
                
                licensesData = [];
                licenses.forEach(doc => licensesData.push({ key: doc.id, ...doc.data() }));
                
                bansData = [];
                bans.forEach(doc => bansData.push({ id: doc.id, ...doc.data() }));
                
                renderData();
            } catch (error) {
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        <i class="fas fa-exclamation-triangle" style="font-size: 48px; margin-bottom: 20px; display: block;"></i>
                        Ошибка: ${error.message}
                        <br><br>
                        <button class="btn" onclick="location.reload()">Перезагрузить</button>
                    </div>
                `;
            }
        }
        
        function showTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderData();
        }
        
        function renderData() {
            const content = document.getElementById('content');
            let html = '';
            
            if (currentTab === 'overview') {
                html = `
                    <div class="stats">
                        <div class="stat-card"><div class="stat-value">${Object.keys(usersData).length}</div><div class="stat-label">Пользователей</div></div>
                        <div class="stat-card"><div class="stat-value">${ticketsData.length}</div><div class="stat-label">Тикетов</div></div>
                        <div class="stat-card"><div class="stat-value">${licensesData.length}</div><div class="stat-label">Лицензий</div></div>
                        <div class="stat-card"><div class="stat-value">${bansData.length}</div><div class="stat-label">Банов</div></div>
                    </div>
                    <div class="section">
                        <h2>📊 Быстрый обзор</h2>
                        <div style="color: rgba(255,255,255,0.8); line-height: 2;">
                            <div>✅ Система работает нормально</div>
                            <div>👥 Зарегистрировано: ${Object.keys(usersData).length}</div>
                            <div>🎫 Открытых тикетов: ${ticketsData.filter(t => t.status !== 'closed').length}</div>
                            <div>🔑 Неактивированных ключей: ${licensesData.filter(l => !l.used).length}</div>
                        </div>
                    </div>
                `;
            }
            
            else if (currentTab === 'userinfo') {
                html = `
                    <div class="section">
                        <h2>🔍 Информация о пользователе</h2>
                        <div class="form-group">
                            <label>Введите логин:</label>
                            <div style="display: flex; gap: 10px;">
                                <input type="text" id="searchUsername" placeholder="Логин" style="flex: 1;">
                                <button class="btn" onclick="searchUser()"><i class="fas fa-search"></i> Найти</button>
                            </div>
                        </div>
                        <div id="userSearchResult"></div>
                    </div>
                `;
            }
            
            else if (currentTab === 'users') {
                html = `
                    <div class="section">
                        <h2>👥 Все пользователи (${Object.keys(usersData).length})</h2>
                        <div class="users-grid">
                            ${Object.entries(usersData).map(([username, user]) => `
                                <div class="user-card">
                                    <div class="user-name">${username}</div>
                                    <div class="user-info">
                                        <div><strong>Email:</strong> ${user.email}</div>
                                        <div><strong>Роль:</strong> ${user.role || 'user'}</div>
                                        <div><strong>IP:</strong> ${user.ip || 'Не определен'}</div>
                                        <div><strong>Регистрация:</strong> ${new Date(user.createdAt).toLocaleString('ru-RU')}</div>
                                        <div><strong>Лицензий:</strong> ${user.licenses ? user.licenses.length : 0}</div>
                                    </div>
                                    <button class="btn btn-danger" onclick="deleteUser('${username}')" style="width: 100%;">
                                        <i class="fas fa-trash"></i> Удалить
                                    </button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            
            else if (currentTab === 'tickets') {
                const statusNames = { 'pending': 'В ожидании', 'reviewing': 'Рассматривается', 'waiting_response': 'Ожидание ответа', 'ready': 'Готово', 'closed': 'Закрыт' };
                html = `
                    <div class="section">
                        <h2>🎫 Все тикеты (${ticketsData.length})</h2>
                        ${ticketsData.length === 0 ? '<p style="color: rgba(255,255,255,0.6);">Тикетов нет</p>' : 
                            ticketsData.map(ticket => `
                                <div class="ticket-card">
                                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                                        <div class="user-name">${ticket.subject}</div>
                                        <select class="ticket-status" onchange="changeTicketStatus('${ticket.id}', this.value)">
                                            ${Object.entries(statusNames).map(([v, l]) => `<option value="${v}" ${ticket.status === v ? 'selected' : ''}>${l}</option>`).join('')}
                                        </select>
                                    </div>
                                    <div class="user-info">
                                        <div><strong>От:</strong> ${ticket.username}</div>
                                        <div><strong>Создан:</strong> ${new Date(ticket.createdAt).toLocaleString('ru-RU')}</div>
                                        <div style="margin-top: 10px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px;">${ticket.message}</div>
                                        ${ticket.responses && ticket.responses.length > 0 ? `
                                            <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1);">
                                                <strong>Ответы (${ticket.responses.length}):</strong>
                                                ${ticket.responses.map(r => `
                                                    <div style="margin-top: 10px; padding: 10px; background: rgba(74, 144, 226, 0.1); border-left: 3px solid #4A90E2; border-radius: 4px;">
                                                        <div style="color: #4A90E2; font-weight: 600;">${r.from}</div>
                                                        <div style="color: rgba(255,255,255,0.9); margin-top: 5px;">${r.message}</div>
                                                        <div style="color: rgba(255,255,255,0.5); font-size: 12px; margin-top: 5px;">${new Date(r.date).toLocaleString('ru-RU')}</div>
                                                    </div>
                                                `).join('')}
                                            </div>
                                        ` : ''}
                                    </div>
                                    <input type="text" id="response_${ticket.id}" class="response-input" placeholder="Ваш ответ...">
                                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                                        <button class="btn" onclick="respondToTicket('${ticket.id}')" style="flex: 1;"><i class="fas fa-reply"></i> Ответить</button>
                                        <button class="btn btn-danger" onclick="deleteTicket('${ticket.id}')"><i class="fas fa-trash"></i> Удалить</button>
                                    </div>
                                </div>
                            `).join('')
                        }
                    </div>
                `;
            }
            
            else if (currentTab === 'keygen') {
                html = `
                    <div class="section">
                        <h2>🔑 Генератор лицензий</h2>
                        <div class="form-group">
                            <label>Тип лицензии:</label>
                            <div class="license-types">
                                ${['1day', '7days', '30days', '90days', 'beta', 'lifetime'].map(type => 
                                    `<div class="license-type-btn ${selectedLicenseType === type ? 'active' : ''}" onclick="selectLicenseType('${type}')">${typeNames[type]}</div>`
                                ).join('')}
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Тип выдачи:</label>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                                <div class="license-type-btn ${selectedPaymentType === 'paid' ? 'active' : ''}" onclick="selectPaymentType('paid')">💰 Платно</div>
                                <div class="license-type-btn ${selectedPaymentType === 'free' ? 'active' : ''}" onclick="selectPaymentType('free')">🎁 Бесплатно</div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Количество (1-100):</label>
                            <input type="number" id="keyCount" min="1" max="100" value="1">
                        </div>
                        <button class="btn" onclick="generateKeys()" style="width: 100%;"><i class="fas fa-key"></i> Сгенерировать</button>
                        <div id="generatedKeysContainer"></div>
                    </div>
                `;
            }
            
            else if (currentTab === 'allkeys') {
                html = `
                    <div class="section">
                        <h2>📋 Все лицензии (${licensesData.length})</h2>
                        <div style="display: grid; gap: 15px;">
                            ${licensesData.map(license => `
                                <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);">
                                    <div style="display: flex; justify-content: space-between; align-items: center;">
                                        <div style="font-family: 'Courier New', monospace; font-size: 18px; font-weight: 600; color: #4A90E2;">${license.key}</div>
                                        <div style="display: flex; gap: 10px;">
                                            <div style="padding: 5px 12px; background: ${license.paymentType === 'free' ? 'rgba(76, 175, 80, 0.2)' : 'rgba(255, 193, 7, 0.2)'}; color: ${license.paymentType === 'free' ? '#4CAF50' : '#FFC107'}; border-radius: 20px; font-size: 12px; font-weight: 600;">
                                                ${license.paymentType === 'free' ? '🎁 Бесплатно' : '💰 Платно'}
                                            </div>
                                            <div style="padding: 5px 12px; background: ${license.used ? 'rgba(76, 175, 80, 0.2)' : 'rgba(255, 152, 0, 0.2)'}; color: ${license.used ? '#4CAF50' : '#FF9800'}; border-radius: 20px; font-size: 12px; font-weight: 600;">
                                                ${license.used ? 'Активирован' : 'Не активирован'}
                                            </div>
                                        </div>
                                    </div>
                                    <div style="margin-top: 10px; color: rgba(255,255,255,0.7); font-size: 14px;">
                                        <div><strong>Тип:</strong> ${typeNames[license.type] || license.type}</div>
                                        <div><strong>Создан:</strong> ${new Date(license.createdAt).toLocaleString('ru-RU')}</div>
                                        ${license.used ? `<div><strong>Активирован:</strong> ${license.activatedBy} (${new Date(license.activatedAt).toLocaleString('ru-RU')})</div>` : ''}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            
            else if (currentTab === 'bans') {
                html = `
                    <div class="section">
                        <h2>⛔ Система банов</h2>
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; margin-bottom: 30px;">
                            <div style="background: rgba(255,255,255,0.03); padding: 20px; border-radius: 12px;">
                                <h3 style="margin-bottom: 20px; color: #4A90E2;">Забанить пользователя</h3>
                                <div class="form-group">
                                    <label>Логин:</label>
                                    <input type="text" id="banUsername" placeholder="Логин">
                                </div>
                                <div class="form-group">
                                    <label>Длительность:</label>
                                    <select id="banDuration">
                                        <option value="1">1 час</option>
                                        <option value="24">24 часа</option>
                                        <option value="168">7 дней</option>
                                        <option value="720">30 дней</option>
                                        <option value="permanent">Навсегда</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>Причина:</label>
                                    <textarea id="banReason" placeholder="Причина"></textarea>
                                </div>
                                <button class="btn btn-danger" onclick="banUser()" style="width: 100%;"><i class="fas fa-ban"></i> Забанить</button>
                            </div>
                            <div style="background: rgba(255,255,255,0.03); padding: 20px; border-radius: 12px;">
                                <h3 style="margin-bottom: 20px; color: #4A90E2;">Забанить IP</h3>
                                <div class="form-group">
                                    <label>IP:</label>
                                    <input type="text" id="banIP" placeholder="IP адрес">
                                </div>
                                <div class="form-group">
                                    <label>Причина:</label>
                                    <textarea id="banIPReason" placeholder="Причина"></textarea>
                                </div>
                                <button class="btn btn-danger" onclick="banIPAddress()" style="width: 100%;"><i class="fas fa-ban"></i> Забанить IP</button>
                            </div>
                        </div>
                        <h3 style="margin-bottom: 20px;">Активные баны (${bansData.length})</h3>
                        ${bansData.length === 0 ? '<p style="color: rgba(255,255,255,0.6);">Банов нет</p>' : 
                            bansData.map(ban => `
                                <div style="display: flex; justify-content: space-between; align-items: center; padding: 20px; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 15px;">
                                    <div>
                                        <div><strong>${ban.type === 'username' ? 'Логин' : 'IP'}:</strong> ${ban.value}</div>
                                        <div><strong>Причина:</strong> ${ban.reason}</div>
                                        <div><strong>До:</strong> ${ban.until === 'permanent' ? 'Навсегда' : new Date(ban.until).toLocaleString('ru-RU')}</div>
                                    </div>
                                    <button class="btn" style="background: #4CAF50;" onclick="unban('${ban.id}')"><i class="fas fa-check"></i> Разбанить</button>
                                </div>
                            `).join('')
                        }
                    </div>
                `;
            }
            
            content.innerHTML = html;
        }
        
        function selectLicenseType(type) {
            selectedLicenseType = type;
            renderData();
        }
        
        function selectPaymentType(type) {
            selectedPaymentType = type;
            renderData();
        }
        
        function generateLicenseKey() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let key = '';
            for (let i = 0; i < 4; i++) {
                if (i > 0) key += '-';
                for (let j = 0; j < 4; j++) {
                    key += chars.charAt(Math.floor(Math.random() * chars.length));
                }
            }
            return key;
        }
        
        async function generateKeys() {
            const count = parseInt(document.getElementById('keyCount').value);
            if (count < 1 || count > 100) {
                alert('❌ Количество от 1 до 100');
                return;
            }
            
            const keys = [];
            try {
                for (let i = 0; i < count; i++) {
                    const key = generateLicenseKey();
                    await db.collection('licenses').doc(key).set({
                        type: selectedLicenseType,
                        paymentType: selectedPaymentType,
                        used: false,
                        createdAt: new Date().toISOString(),
                        createdBy: session.username
                    });
                    keys.push(key);
                }
                
                document.getElementById('generatedKeysContainer').innerHTML = `
                    <div class="generated-keys">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                            <strong style="color: #4CAF50;">✅ Сгенерировано: ${count} (${selectedPaymentType === 'free' ? '🎁 Бесплатно' : '💰 Платно'})</strong>
                            <button class="btn" onclick="copyKeys(\`${keys.join('\\n')}\`)"><i class="fas fa-copy"></i> Копировать</button>
                        </div>
                        ${keys.map(key => `<div class="key-item">${key}</div>`).join('')}
                    </div>
                `;
                
                alert(`✅ Сгенерировано ${count} ключей`);
                await loadData();
            } catch (error) {
                alert('❌ Ошибка: ' + error.message);
            }
        }
        
        function copyKeys(text) {
            navigator.clipboard.writeText(text).then(() => alert('✅ Скопировано'));
        }
        
        async function searchUser() {
            const username = document.getElementById('searchUsername').value.trim();
            if (!username) {
                alert('❌ Введите логин');
                return;
            }
            
            if (!usersData[username]) {
                document.getElementById('userSearchResult').innerHTML = `
                    <div style="text-align: center; padding: 40px; color: rgba(255,255,255,0.6);">
                        <i class="fas fa-user-slash" style="font-size: 48px; margin-bottom: 20px; display: block;"></i>
                        Пользователь "${username}" не найден
                    </div>
                `;
                return;
            }
            
            const user = usersData[username];
            const userLicenses = licensesData.filter(l => l.activatedBy === username);
            const userTickets = ticketsData.filter(t => t.username === username);
            const freeLicenses = userLicenses.filter(l => l.paymentType === 'free');
            const paidLicenses = userLicenses.filter(l => l.paymentType === 'paid' || !l.paymentType);
            
            // Calculate subscription info
            function getSubscriptionInfo(type) {
                const license = userLicenses.find(l => l.type === type);
                if (!license) return { has: false, text: '❌ Нет подписки', color: '#F44336' };
                
                const activatedDate = new Date(license.activatedAt || license.createdAt);
                let expiryDate;
                let daysTotal;
                
                if (type === 'lifetime') {
                    return { has: true, text: '✅ Навсегда', color: '#4CAF50' };
                } else if (type === 'beta') {
                    return { has: true, text: '✅ Есть доступ', color: '#4CAF50' };
                } else if (type === '1day') {
                    daysTotal = 1;
                    expiryDate = new Date(activatedDate.getTime() + 1 * 24 * 60 * 60 * 1000);
                } else if (type === '7days') {
                    daysTotal = 7;
                    expiryDate = new Date(activatedDate.getTime() + 7 * 24 * 60 * 60 * 1000);
                } else if (type === '30days') {
                    daysTotal = 30;
                    expiryDate = new Date(activatedDate.getTime() + 30 * 24 * 60 * 60 * 1000);
                } else if (type === '90days') {
                    daysTotal = 90;
                    expiryDate = new Date(activatedDate.getTime() + 90 * 24 * 60 * 60 * 1000);
                }
                
                const now = new Date();
                const timeLeft = expiryDate - now;
                
                if (timeLeft <= 0) {
                    return { has: true, text: `⚠️ Подписка на ${daysTotal} дней истекла`, color: '#F44336' };
                }
                
                const daysLeft = Math.floor(timeLeft / (1000 * 60 * 60 * 24));
                const hoursLeft = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                
                const color = daysLeft <= 3 ? '#FF9800' : '#4CAF50';
                return { 
                    has: true, 
                    text: `✅ Подписка на ${daysTotal} дней<br>Осталось: ${daysLeft} дней ${hoursLeft} часов`,
                    color: color,
                    expiry: expiryDate.toLocaleDateString('ru-RU')
                };
            }
            
            const sub1 = getSubscriptionInfo('1day');
            const sub7 = getSubscriptionInfo('7days');
            const sub30 = getSubscriptionInfo('30days');
            const sub90 = getSubscriptionInfo('90days');
            const subLifetime = getSubscriptionInfo('lifetime');
            const subBeta = getSubscriptionInfo('beta');
            
            document.getElementById('userSearchResult').innerHTML = `
                <div style="background: rgba(255,255,255,0.05); padding: 30px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); margin-top: 20px;">
                    <h3 style="color: #4A90E2; margin-bottom: 20px; font-size: 28px;"><i class="fas fa-user"></i> ${username}</h3>
                    
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px;">
                        <div style="background: rgba(255,255,255,0.03); padding: 20px; border-radius: 12px;">
                            <h4 style="color: #4A90E2; margin-bottom: 15px;">📋 Основная информация</h4>
                            <div style="color: rgba(255,255,255,0.8); line-height: 2;">
                                <div><strong>Email:</strong> ${user.email}</div>
                                <div><strong>Роль:</strong> ${user.role || 'user'}</div>
                                <div><strong>IP:</strong> ${user.ip || 'Не определен'}</div>
                                <div><strong>HWID:</strong> ${user.hwid || 'Не привязан'}</div>
                                <div><strong>Регистрация:</strong> ${new Date(user.createdAt).toLocaleString('ru-RU')}</div>
                            </div>
                        </div>
                        
                        <div style="background: rgba(255,255,255,0.03); padding: 20px; border-radius: 12px;">
                            <h4 style="color: #4A90E2; margin-bottom: 15px;">🎫 Подписки</h4>
                            <div style="color: rgba(255,255,255,0.8); line-height: 2.2; font-size: 14px;">
                                <div style="color: ${subLifetime.color || 'inherit'};">
                                    <strong>Навсегда:</strong> ${subLifetime.text}
                                </div>
                                <div style="color: ${sub90.color || 'inherit'};">
                                    <strong>90 дней:</strong> ${sub90.text}
                                </div>
                                <div style="color: ${sub30.color || 'inherit'};">
                                    <strong>30 дней:</strong> ${sub30.text}
                                </div>
                                <div style="color: ${sub7.color || 'inherit'};">
                                    <strong>7 дней:</strong> ${sub7.text}
                                </div>
                                <div style="color: ${sub1.color || 'inherit'};">
                                    <strong>1 день:</strong> ${sub1.text}
                                </div>
                                <div style="color: ${subBeta.color || 'inherit'};">
                                    <strong>Бета:</strong> ${subBeta.text}
                                </div>
                            </div>
                        </div>
                        
                        <div style="background: rgba(255,255,255,0.03); padding: 20px; border-radius: 12px;">
                            <h4 style="color: #4A90E2; margin-bottom: 15px;">💰 Покупки</h4>
                            <div style="color: rgba(255,255,255,0.8); line-height: 2;">
                                <div>Всего лицензий: ${userLicenses.length}</div>
                                <div>Платных: ${paidLicenses.length}</div>
                                <div>Бесплатных: ${freeLicenses.length}</div>
                                <div>Тикетов: ${userTickets.length}</div>
                            </div>
                        </div>
                    </div>
                    
                    <div style="background: rgba(74, 144, 226, 0.1); padding: 20px; border-radius: 12px; border: 1px solid #4A90E2; margin-bottom: 20px;">
                        <h4 style="color: #4A90E2; margin-bottom: 15px;">➕ Выдать подписку</h4>
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px;">
                            <button class="btn" onclick="grantSubscription('${username}', '30days')"><i class="fas fa-gift"></i> 30 дней</button>
                            <button class="btn" onclick="grantSubscription('${username}', '90days')"><i class="fas fa-gift"></i> 90 дней</button>
                            <button class="btn" onclick="grantSubscription('${username}', 'lifetime')"><i class="fas fa-gift"></i> Навсегда</button>
                            <button class="btn" onclick="grantSubscription('${username}', 'beta')"><i class="fas fa-gift"></i> Бета</button>
                        </div>
                    </div>
                    
                    <div style="background: rgba(244, 67, 54, 0.1); padding: 20px; border-radius: 12px; border: 1px solid #F44336;">
                        <h4 style="color: #F44336; margin-bottom: 15px;">➖ Изъять подписку</h4>
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 15px;">
                            <button class="btn btn-danger" onclick="revokeSubscription('${username}', '30days')"><i class="fas fa-minus"></i> 30 дней</button>
                            <button class="btn btn-danger" onclick="revokeSubscription('${username}', '90days')"><i class="fas fa-minus"></i> 90 дней</button>
                            <button class="btn btn-danger" onclick="revokeSubscription('${username}', 'lifetime')"><i class="fas fa-minus"></i> Навсегда</button>
                            <button class="btn btn-danger" onclick="revokeSubscription('${username}', 'beta')"><i class="fas fa-minus"></i> Бета</button>
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Изъять на N дней:</label>
                            <div style="display: flex; gap: 10px;">
                                <input type="number" id="revokeDays" placeholder="Дней" min="1" style="flex: 1;">
                                <button class="btn btn-danger" onclick="revokeDays('${username}')"><i class="fas fa-minus"></i> Изъять</button>
                            </div>
                        </div>
                    </div>
                    
                    ${userLicenses.length > 0 ? `
                        <div style="margin-top: 20px;">
                            <h4 style="color: #4A90E2; margin-bottom: 15px;">🔑 Активированные лицензии (${userLicenses.length})</h4>
                            ${userLicenses.map(license => `
                                <div style="background: rgba(255,255,255,0.03); padding: 15px; border-radius: 8px; margin-bottom: 10px;">
                                    <div style="font-family: 'Courier New', monospace; color: #4A90E2; font-weight: 600; margin-bottom: 5px;">${license.key}</div>
                                    <div style="color: rgba(255,255,255,0.6); font-size: 14px;">
                                        ${typeNames[license.type]} • ${license.paymentType === 'free' ? '🎁 Бесплатно' : '💰 Платно'} • ${new Date(license.activatedAt || license.createdAt).toLocaleDateString('ru-RU')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                </div>
            `;
        }
        
        async function grantSubscription(username, type) {
            if (!confirm(`Выдать подписку "${typeNames[type]}" пользователю ${username}?`)) return;
            
            try {
                const key = generateLicenseKey();
                const licenseData = {
                    type: type,
                    paymentType: 'free',
                    used: true,
                    activatedBy: username,
                    activatedAt: new Date().toISOString(),
                    createdAt: new Date().toISOString(),
                    createdBy: session.username,
                    grantedDirectly: true
                };
                
                await db.collection('licenses').doc(key).set(licenseData);
                
                const userLicenses = usersData[username].licenses || [];
                userLicenses.push(key);
                await db.collection('users').doc(username).update({ licenses: userLicenses });
                
                alert('✅ Подписка выдана');
                await loadData();
                searchUser();
            } catch (error) {
                alert('❌ Ошибка: ' + error.message);
            }
        }
        
        async function revokeSubscription(username, type) {
            if (!confirm(`Изъять подписку "${typeNames[type]}" у ${username}?`)) return;
            
            try {
                const userLicenses = licensesData.filter(l => l.activatedBy === username && l.type === type);
                if (userLicenses.length === 0) {
                    alert('❌ У пользователя нет такой подписки');
                    return;
                }
                
                const license = userLicenses[0];
                await db.collection('licenses').doc(license.key).delete();
                
                const updatedLicenses = (usersData[username].licenses || []).filter(k => k !== license.key);
                await db.collection('users').doc(username).update({ licenses: updatedLicenses });
                
                alert('✅ Подписка изъята');
                await loadData();
                searchUser();
            } catch (error) {
                alert('❌ Ошибка: ' + error.message);
            }
        }
        
        async function revokeDays(username) {
            const days = parseInt(document.getElementById('revokeDays').value);
            if (!days || days < 1) {
                alert('❌ Введите количество дней');
                return;
            }
            
            if (!confirm(`Изъять подписку на ${days} дней у ${username}?`)) return;
            
            try {
                const type = days <= 1 ? '1day' : days <= 7 ? '7days' : days <= 30 ? '30days' : '90days';
                await revokeSubscription(username, type);
            } catch (error) {
                alert('❌ Ошибка: ' + error.message);
            }
        }
        
        async function deleteUser(username) {
            if (!confirm(`Удалить ${username}?`)) return;
            try {
                await db.collection('users').doc(username).delete();
                alert('✅ Удален');
                await loadData();
            } catch (error) {
                alert('❌ Ошибка: ' + error.message);
            }
        }
        
        async function deleteTicket(ticketId) {
            if (!confirm('Удалить тикет?')) return;
            try {
                await db.collection('tickets').doc(ticketId).delete();
                alert('✅ Удален');
                await loadData();
            } catch (error) {
                alert('❌ Ошибка: ' + error.message);
            }
        }
        
        async function changeTicketStatus(ticketId, newStatus) {
            try {
                await db.collection('tickets').doc(ticketId).update({
                    status: newStatus,
                    updatedAt: new Date().toISOString()
                });
                alert('✅ Статус обновлен');
                await loadData();
            } catch (error) {
                alert('❌ Ошибка: ' + error.message);
            }
        }
        
        async function respondToTicket(ticketId) {
            const input = document.getElementById(`response_${ticketId}`);
            const message = input.value.trim();
            if (!message) {
                alert('❌ Введите ответ');
                return;
            }
            
            try {
                await db.collection('tickets').doc(ticketId).update({
                    responses: firebase.firestore.FieldValue.arrayUnion({
                        from: session.username,
                        message: message,
                        date: new Date().toISOString()
                    }),
                    updatedAt: new Date().toISOString()
                });
                
                input.value = '';
                alert('✅ Ответ отправлен');
                await loadData();
            } catch (error) {
                alert('❌ Ошибка: ' + error.message);
            }
        }
        
        async function banUser() {
            const username = document.getElementById('banUsername').value.trim();
            const duration = document.getElementById('banDuration').value;
            const reason = document.getElementById('banReason').value.trim();
            
            if (!username || !reason) {
                alert('❌ Заполните все поля');
                return;
            }
            
            if (!usersData[username]) {
                alert('❌ Пользователь не найден');
                return;
            }
            
            const banUntil = duration === 'permanent' ? 'permanent' : 
                new Date(Date.now() + parseInt(duration) * 60 * 60 * 1000).toISOString();
            
            try {
                await db.collection('users').doc(username).update({
                    banned: true,
                    bannedUntil: banUntil,
                    banReason: reason
                });
                
                await db.collection('bans').doc('ban_' + Date.now()).set({
                    type: 'username',
                    value: username,
                    reason: reason,
                    until: banUntil,
                    createdAt: new Date().toISOString(),
                    createdBy: session.username
                });
                
                document.getElementById('banUsername').value = '';
                document.getElementById('banReason').value = '';
                alert('✅ Забанен');
                await loadData();
            } catch (error) {
                alert('❌ Ошибка: ' + error.message);
            }
        }
        
        async function banIPAddress() {
            const ip = document.getElementById('banIP').value.trim();
            const reason = document.getElementById('banIPReason').value.trim();
            
            if (!ip || !reason) {
                alert('❌ Заполните все поля');
                return;
            }
            
            try {
                await db.collection('bans').doc('ban_ip_' + Date.now()).set({
                    type: 'ip',
                    value: ip,
                    reason: reason,
                    until: 'permanent',
                    createdAt: new Date().toISOString(),
                    createdBy: session.username
                });
                
                document.getElementById('banIP').value = '';
                document.getElementById('banIPReason').value = '';
                alert('✅ IP забанен');
                await loadData();
            } catch (error) {
                alert('❌ Ошибка: ' + error.message);
            }
        }
        
        async function unban(banId) {
            if (!confirm('Снять бан?')) return;
            try {
                const banDoc = await db.collection('bans').doc(banId).get();
                const ban = banDoc.data();
                
                await db.collection('bans').doc(banId).delete();
                
                if (ban.type === 'username') {
                    await db.collection('users').doc(ban.value).update({
                        banned: false,
                        bannedUntil: null,
                        banReason: null
                    });
                }
                
                alert('✅ Разбанен');
                await loadData();
            } catch (error) {
                alert('❌ Ошибка: ' + error.message);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helper Panel - Forever Client</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f0c29);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: white;
            min-height: 100vh;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        h1 {
            text-align: center;
            font-size: 48px;
            margin-bottom: 40px;
            color: #4A90E2;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        
        .stat-value {
            font-size: 48px;
            font-weight: 700;
            color: #4A90E2;
            margin-bottom: 10px;
        }
        
        .stat-label {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .section {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
        }
        
        .section h2 {
            font-size: 32px;
            margin-bottom: 25px;
            color: #4A90E2;
        }
        
        .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .user-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .user-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #4A90E2;
        }
        
        .user-info {
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.8;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            font-size: 24px;
            color: #4A90E2;
        }
        
        .error {
            text-align: center;
            padding: 60px;
            font-size: 20px;
            color: #F44336;
        }
        
        .btn {
            padding: 10px 20px;
            background: #4A90E2;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
        }
        
        .btn:hover {
            background: #357ABD;
        }
        
        .btn-danger {
            background: #F44336;
        }
        
        .btn-danger:hover {
            background: #da190b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛠️ Helper Panel</h1>
        
        <div id="content">
            <div class="loading">
                <i class="fas fa-spinner fa-spin" style="font-size: 48px; margin-bottom: 20px; display: block;"></i>
                Загрузка данных...
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <script>
        console.log('🔵 Скрипт запущен');
        
        const firebaseConfig = {
            apiKey: "AIzaSyBbZLa2MBIIMSto6exJhIH1Vv2POzhakRM",
            authDomain: "forever-client.firebaseapp.com",
            projectId: "forever-client",
            storageBucket: "forever-client.firebasestorage.app",
            messagingSenderId: "639676123653",
            appId: "1:639676123653:web:dd28cb5cc5ae537020326c"
        };
        
        let db;
        
        window.addEventListener('load', async () => {
            console.log('✅ Страница загружена');
            
            try {
                // Check session
                const sessionData = localStorage.getItem('forever_session');
                if (!sessionData) {
                    console.log('❌ Нет сессии');
                    window.location.href = '../index.html';
                    return;
                }
                
                const session = JSON.parse(sessionData);
                console.log('✅ Сессия найдена:', session.username);
                
                // Check if admin or Helper
                if (session.username !== 'admin' && session.username !== 'Helper') {
                    alert('⛔ Доступ запрещен!');
                    window.location.href = '../index.html';
                    return;
                }
                
                console.log('✅ Доступ разрешен');
                
                // Initialize Firebase
                console.log('🔵 Инициализация Firebase...');
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                console.log('✅ Firebase инициализирован');
                
                // Load data
                await loadData();
                
            } catch (error) {
                console.error('❌ Ошибка:', error);
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        <i class="fas fa-exclamation-triangle" style="font-size: 48px; margin-bottom: 20px; display: block;"></i>
                        Ошибка: ${error.message}
                        <br><br>
                        <button class="btn" onclick="location.reload()">Перезагрузить</button>
                    </div>
                `;
            }
        });
        
        async function loadData() {
            try {
                console.log('🔵 Загрузка данных...');
                
                const usersSnapshot = await db.collection('users').get();
                const ticketsSnapshot = await db.collection('tickets').get();
                const licensesSnapshot = await db.collection('licenses').get();
                
                console.log('✅ Данные загружены');
                
                const users = {};
                usersSnapshot.forEach(doc => {
                    users[doc.id] = doc.data();
                });
                
                const tickets = [];
                ticketsSnapshot.forEach(doc => {
                    tickets.push({ id: doc.id, ...doc.data() });
                });
                
                const licenses = [];
                licensesSnapshot.forEach(doc => {
                    licenses.push({ key: doc.id, ...doc.data() });
                });
                
                renderData(users, tickets, licenses);
                
            } catch (error) {
                console.error('❌ Ошибка загрузки:', error);
                throw error;
            }
        }
        
        function renderData(users, tickets, licenses) {
            const content = document.getElementById('content');
            
            content.innerHTML = `
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-value">${Object.keys(users).length}</div>
                        <div class="stat-label">Пользователей</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${tickets.length}</div>
                        <div class="stat-label">Тикетов</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${licenses.length}</div>
                        <div class="stat-label">Лицензий</div>
                    </div>
                </div>
                
                <div class="section">
                    <h2>👥 Пользователи</h2>
                    <div class="users-grid">
                        ${Object.entries(users).map(([username, user]) => `
                            <div class="user-card">
                                <div class="user-name">${username}</div>
                                <div class="user-info">
                                    <div><strong>Email:</strong> ${user.email}</div>
                                    <div><strong>Роль:</strong> ${user.role || 'user'}</div>
                                    <div><strong>Регистрация:</strong> ${new Date(user.createdAt).toLocaleString('ru-RU')}</div>
                                    <div><strong>Лицензий:</strong> ${user.licenses ? user.licenses.length : 0}</div>
                                </div>
                                <button class="btn btn-danger" onclick="deleteUser('${username}')">
                                    <i class="fas fa-trash"></i> Удалить
                                </button>
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="section">
                    <h2>🎫 Тикеты</h2>
                    ${tickets.length === 0 ? '<p style="color: rgba(255,255,255,0.6);">Тикетов нет</p>' : 
                        tickets.map(ticket => `
                            <div class="user-card" style="margin-bottom: 20px;">
                                <div class="user-name">${ticket.subject}</div>
                                <div class="user-info">
                                    <div><strong>От:</strong> ${ticket.username}</div>
                                    <div><strong>Статус:</strong> ${ticket.status}</div>
                                    <div><strong>Сообщение:</strong> ${ticket.message}</div>
                                </div>
                                <button class="btn btn-danger" onclick="deleteTicket('${ticket.id}')">
                                    <i class="fas fa-trash"></i> Удалить
                                </button>
                            </div>
                        `).join('')
                    }
                </div>
                
                <div style="text-align: center; margin-top: 40px;">
                    <a href="../index.html" class="btn" style="display: inline-block; text-decoration: none;">
                        <i class="fas fa-home"></i> На главную
                    </a>
                </div>
            `;
        }
        
        async function deleteUser(username) {
            if (!confirm(`Удалить пользователя ${username}?`)) return;
            
            try {
                await db.collection('users').doc(username).delete();
                alert('✅ Пользователь удален');
                location.reload();
            } catch (error) {
                alert('❌ Ошибка: ' + error.message);
            }
        }
        
        async function deleteTicket(ticketId) {
            if (!confirm('Удалить тикет?')) return;
            
            try {
                await db.collection('tickets').doc(ticketId).delete();
                alert('✅ Тикет удален');
                location.reload();
            } catch (error) {
                alert('❌ Ошибка: ' + error.message);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: white;
            padding: 40px;
            max-width: 800px;
            margin: 0 auto;
        }
        .log {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            max-height: 500px;
            overflow-y: auto;
        }
        .success { color: #4CAF50; }
        .error { color: #F44336; }
        .info { color: #2196F3; }
        button {
            padding: 12px 24px;
            background: #4A90E2;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px;
        }
        button:hover {
            background: #357ABD;
        }
    </style>
</head>
<body>
    <h1>🔥 Firebase Connection Test</h1>
    <p>Эта страница проверяет подключение к Firebase и загрузку данных.</p>
    
    <div>
        <button onclick="testConnection()">Проверить подключение</button>
        <button onclick="loadUsers()">Загрузить пользователей</button>
        <button onclick="clearLog()">Очистить лог</button>
    </div>
    
    <div id="log" class="log">
        <div class="info">Ожидание действий...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="../firebase-config.js"></script>
    
    <script>
        const logDiv = document.getElementById('log');
        let db;
        
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString('ru-RU');
            const div = document.createElement('div');
            div.className = type;
            div.textContent = `[${timestamp}] ${message}`;
            logDiv.appendChild(div);
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        function clearLog() {
            logDiv.innerHTML = '<div class="info">Лог очищен</div>';
        }
        
        async function testConnection() {
            clearLog();
            log('Начало проверки...', 'info');
            
            try {
                if (typeof firebase === 'undefined') {
                    log('Firebase SDK не загружен!', 'error');
                    return;
                }
                log('Firebase SDK загружен', 'success');
                
                if (!window.firebaseConfig) {
                    log('Firebase config не найден!', 'error');
                    return;
                }
                log('Firebase config найден', 'success');
                
                if (!firebase.apps.length) {
                    firebase.initializeApp(window.firebaseConfig);
                }
                log('Firebase инициализирован', 'success');
                
                db = firebase.firestore();
                log('Firestore подключен', 'success');
                
                const testSnapshot = await db.collection('users').limit(1).get();
                log('Доступ к Firestore работает!', 'success');
                log('Документов в users: ' + testSnapshot.size, 'info');
                
            } catch (error) {
                log('Ошибка: ' + error.message, 'error');
            }
        }
        
        async function loadUsers() {
            if (!db) {
                log('Сначала проверьте подключение!', 'error');
                return;
            }
            
            try {
                log('Загрузка пользователей...', 'info');
                const snapshot = await db.collection('users').get();
                log('Загружено пользователей: ' + snapshot.size, 'success');
                
                snapshot.forEach(doc => {
                    log('Пользователь: ' + doc.id, 'info');
                });
                
            } catch (error) {
                log('Ошибка загрузки: ' + error.message, 'error');
            }
        }
    </script>
</body>
</html>

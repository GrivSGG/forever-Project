<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Массовое удаление пользователей</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f0c29);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: white;
            padding: 40px;
            min-height: 100vh;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 { color: #4A90E2; margin-bottom: 30px; text-align: center; }
        .warning {
            background: rgba(244, 67, 54, 0.2);
            border: 2px solid #F44336;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            font-size: 18px;
            font-weight: 600;
        }
        .info {
            background: rgba(74, 144, 226, 0.2);
            border: 1px solid #4A90E2;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #F44336;
            border: none;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 10px;
        }
        button:hover { background: #da190b; }
        button:disabled { background: #666; cursor: not-allowed; }
        #log {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }
        .log-item { margin-bottom: 5px; }
        .log-success { color: #4CAF50; }
        .log-error { color: #F44336; }
        .log-info { color: #4A90E2; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚠️ Массовое удаление пользователей</h1>
        
        <div class="warning">
            ⚠️ ВНИМАНИЕ! Это действие удалит ВСЕХ пользователей кроме admin и Helper!<br>
            Это действие НЕОБРАТИМО!
        </div>
        
        <div class="info">
            <strong>Будут сохранены:</strong><br>
            • admin<br>
            • Helper
        </div>
        
        <div class="info">
            <strong>Будут удалены:</strong><br>
            • Все остальные пользователи
        </div>
        
        <button onclick="deleteAllUsers()">🗑️ УДАЛИТЬ ВСЕХ ПОЛЬЗОВАТЕЛЕЙ (кроме admin и Helper)</button>
        
        <div id="log"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBbZLa2MBIIMSto6exJhIH1Vv2POzhakRM",
            authDomain: "forever-client.firebaseapp.com",
            projectId: "forever-client",
            storageBucket: "forever-client.firebasestorage.app",
            messagingSenderId: "639676123653",
            appId: "1:639676123653:web:dd28cb5cc5ae537020326c"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const item = document.createElement('div');
            item.className = `log-item log-${type}`;
            item.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(item);
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        async function deleteAllUsers() {
            if (!confirm('Вы УВЕРЕНЫ? Это удалит всех пользователей кроме admin и Helper!')) {
                return;
            }
            
            if (!confirm('ПОСЛЕДНЕЕ ПРЕДУПРЕЖДЕНИЕ! Это действие необратимо!')) {
                return;
            }
            
            const button = document.querySelector('button');
            button.disabled = true;
            button.textContent = 'Удаление...';
            
            document.getElementById('log').innerHTML = '';
            log('Начало удаления пользователей...', 'info');
            
            try {
                // Получаем всех пользователей
                const snapshot = await db.collection('users').get();
                log(`Найдено пользователей: ${snapshot.size}`, 'info');
                
                let deleted = 0;
                let skipped = 0;
                let errors = 0;
                
                // Удаляем всех кроме admin и Helper
                for (const doc of snapshot.docs) {
                    const userData = doc.data();
                    const username = userData.username || doc.id;
                    
                    // Пропускаем admin и Helper
                    if (username === 'admin' || username === 'Helper') {
                        log(`⏭️ Пропущен: ${username} (защищен)`, 'info');
                        skipped++;
                        continue;
                    }
                    
                    try {
                        await doc.ref.delete();
                        log(`✅ Удален: ${username}`, 'success');
                        deleted++;
                        
                        // Небольшая задержка чтобы не перегрузить Firebase
                        await new Promise(resolve => setTimeout(resolve, 100));
                    } catch (error) {
                        log(`❌ Ошибка при удалении ${username}: ${error.message}`, 'error');
                        errors++;
                    }
                }
                
                log('', 'info');
                log('=== ИТОГО ===', 'info');
                log(`✅ Удалено: ${deleted}`, 'success');
                log(`⏭️ Пропущено: ${skipped}`, 'info');
                log(`❌ Ошибок: ${errors}`, errors > 0 ? 'error' : 'info');
                log('', 'info');
                log('✅ ГОТОВО!', 'success');
                
                button.textContent = '✅ Удаление завершено';
                
            } catch (error) {
                log(`❌ Критическая ошибка: ${error.message}`, 'error');
                button.disabled = false;
                button.textContent = '🗑️ УДАЛИТЬ ВСЕХ ПОЛЬЗОВАТЕЛЕЙ (кроме admin и Helper)';
            }
        }
    </script>
</body>
</html>
